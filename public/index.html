<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>F1 2026 — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <div class="logo" onclick="renderTab('resumen')" style="cursor:pointer">
          <img src="/img/f1-logo.svg" alt="Formula 1" class="logo-f1-img">
          <div class="logo-text">
            <span class="logo-year">2026</span>
            <span class="logo-sub">DASHBOARD</span>
          </div>
        </div>
        <div id="header-info" class="header-info"></div>
        <button id="audio-btn" class="audio-btn is-muted" title="Activar música" onclick="toggleAudio()">♪</button>
      </div>
    </div>
  </header>

  <audio id="f1-audio" loop src="/audio/f1-theme.mp3"></audio>

  <!-- Driver modal -->
  <div id="driver-modal" class="dmodal-backdrop" style="display:none" onclick="closeDriverModal(event)">
    <div class="dmodal-card">
      <button class="dmodal-close" onclick="closeDriverModal()">✕</button>
      <div id="dmodal-body"></div>
    </div>
  </div>

  <!-- Circuit modal -->
  <div id="circuit-modal" class="cmodal-backdrop" style="display:none" onclick="closeCircuitModal(event)">
    <div class="cmodal-card">
      <button class="cmodal-close" onclick="document.getElementById('circuit-modal').style.display='none';document.body.style.overflow=''">✕</button>
      <div id="cmodal-body"></div>
    </div>
  </div>

  <!-- Team modal -->
  <div id="team-modal" class="tmodal-backdrop" style="display:none" onclick="closeTeamModal(event)">
    <div class="tmodal-card">
      <button class="tmodal-close" onclick="closeTeamModal()">✕</button>
      <div id="tmodal-body"></div>
    </div>
  </div>

  <nav class="tab-nav">
    <div class="container">
      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="resumen">Resumen</button>
        <button class="tab" data-tab="clasificaciones">Clasificaciones</button>
        <button class="tab" data-tab="resultados">Resultados</button>
        <button class="tab" data-tab="highlights">Highlights</button>
        <button class="tab" data-tab="charlas">Charlas</button>
        <button class="tab" data-tab="pilotos">Pilotos</button>
        <button class="tab" data-tab="constructores">Constructores</button>
        <button class="tab" data-tab="evolucion">Evolución</button>
        <button class="tab" data-tab="declaraciones">Declaraciones</button>
        <button class="tab" data-tab="noticias">Noticias</button>
        <button class="tab" data-tab="calendario">Calendario</button>
        <button class="tab" data-tab="circuitos">Circuitos</button>
        <button class="tab" data-tab="reglamento">Reglamento</button>
        <button class="tab" data-tab="historia">Historia</button>
      </div>
    </div>
  </nav>

  <main class="main" id="main">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Cargando temporada 2026…</p>
    </div>
  </main>

  <script src="/js/chart.js"></script>
  <script src="/js/app.js"></script>
  <script>
    function toggleAudio() {
      const audio = document.getElementById('f1-audio')
      const btn   = document.getElementById('audio-btn')
      if (audio.paused) {
        audio.play()
        btn.classList.remove('is-muted')
        btn.title = 'Silenciar música'
      } else {
        audio.pause()
        btn.classList.add('is-muted')
        btn.title = 'Activar música'
      }
    }
  </script>
</body>
</html>
